<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Closing...</title>
</head>
<body>
    <p>You are now logged in!</p><br>
    <p>This page should close automatically. If it doesn't succeed try closing it yourself.</p>
    <script>
        // Attempt to close the window immediately
        window.close();

        // Fallback note: Modern browsers only allow window.close() 
        // on windows/tabs that were opened by a script (using window.open()).
    </script>
</body>
</html>
