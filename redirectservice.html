<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 10px;
            background: #1e1e1e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 400px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        .error-icon {
            color: #ff4a4a;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 0.5rem 0; font-weight: 500;}
        p { color: #aaa; font-size: 0.9rem; margin: 0;}
        .error-message {
            color: #ff7e7e;
            background: rgba(255, 74, 74, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-top: 1rem;
            display: none;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status-spinner" class="spinner"></div>
        <div id="status-error-icon" class="error-icon" style="display: none;">⚠️</div>
        <h2 id="status-title">Authenticating...</h2>
        <p id="status-desc">Verifying your secure login with Wynncraft</p>
        <div id="error-box" class="error-message"></div>
    </div>

    <script>
        function showError(message) {
            document.getElementById('status-spinner').style.display = 'none';
            document.getElementById('status-error-icon').style.display = 'block';
            document.getElementById('status-title').innerText = 'Authentication Failed';
            document.getElementById('status-desc').innerText = 'An error occurred during the handshake process.';
            
            const errorBox = document.getElementById('error-box');
            errorBox.style.display = 'block';
            errorBox.innerText = message;
        }

        async function handleWynncraftCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');

            // Retrieve the verification properties we saved on the login page
            const savedState = sessionStorage.getItem('wynn_oauth_state');
            const codeVerifier = sessionStorage.getItem('wynn_code_verifier');

            // 1. Basic Parameter validation
            if (!code) {
                showError("No authorization code returned from Wynncraft. Did you cancel the sign-in?");
                return;
            }

            // 2. CSRF State validation
            if (!state || state !== savedState) {
                showError("Security violation: OAuth state mismatch! The request might have been tampered with.");
                return;
            }

            // 3. PKCE Verifier validation
            if (!codeVerifier) {
                showError("The verification session expired. Please return to the login page and try again.");
                return;
            }

            // Clean up sessionStorage immediately for security hygiene
            sessionStorage.removeItem('wynn_code_verifier');
            sessionStorage.removeItem('wynn_oauth_state');

            // 4. Fire POST to exchange the code for the token
            try {
                const response = await fetch('https://api.wynncraft.com/v3/oauth/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: 'njUEJhhqs_eOJK73FKy-f3DmBpCm-Z48',
                        code: code,
                        redirect_uri: 'https://wanets.me/redirectservice',
                        code_verifier: codeVerifier // Sent dynamically to match the challenge
                    })
                });

                if (!response.ok) {
                    const errBody = await response.text().catch(() => '');
                    throw new Error(`Server returned status ${response.status}: ${errBody || response.statusText}`);
                }

                const data = await response.json();

                if (data.access_token) {
                    // Store token securely on your frontend domain (localStorage/cookies)
                    localStorage.setItem('wynn_access_token', data.access_token);
                    
                    document.getElementById('status-title').innerText = 'Success!';
                    document.getElementById('status-desc').innerText = 'Redirecting you back to the home page...';
                    
                    // Redirect them to your app landing page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/'; 
                    }, 1500);
                } else {
                    throw new Error("The token response did not contain an 'access_token'.");
                }

            } catch (error) {
                console.error("OAuth token exchange failed:", error);
                showError(error.message);
            }
        }

        // Run immediately when page is parsed
        handleWynncraftCallback();
    </script>
</body>
</html>
